<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OptimERA — hi-fi redesign</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      /* brand */
      --era-yellow: oklch(0.88 0.17 96);          /* from rgb(251,213,61) */
      --era-yellow-dim: oklch(0.78 0.15 95);
      --era-ink: #0a0a0a;
      --era-ink-2: #141414;
      --era-ink-3: #1c1c1c;
      --era-line: rgba(255,255,255,0.08);
      --era-line-strong: rgba(255,255,255,0.14);
      --era-text: #f4f4f2;
      --era-mute: rgba(244,244,242,0.58);
      --era-dim: rgba(244,244,242,0.34);

      --stage-bg: #0b0b0c;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      background: var(--stage-bg);
      color: var(--era-text);
      font-family: 'Geist', -apple-system, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100%;
    }
    #app { min-height: 100vh; }

    /* loading */
    .boot {
      display:flex; align-items:center; justify-content:center;
      min-height: 100vh;
      color: var(--era-mute);
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 12px;
      letter-spacing: 0.04em;
    }
    .boot em { font-style: normal; color: var(--era-yellow); }
  </style>
</head>
<body>
  <div id="app"><div class="boot">loading <em>OptimERA</em>&nbsp;…</div></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="lib/ios-frame.jsx"></script>
  <script type="text/babel" src="src/data.jsx"></script>
  <script type="text/babel" src="src/primitives.jsx"></script>
  <script type="text/babel" src="src/tabbar.jsx"></script>
  <script type="text/babel" src="src/dir-signal/index.jsx"></script>
  <script type="text/babel" src="src/dir-signal/activation.jsx"></script>
  <script type="text/babel" src="src/dir-signal/flows.jsx"></script>
  <script type="text/babel" src="src/dir-editorial/index.jsx"></script>
  <script type="text/babel" src="src/dir-spatial/index.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
